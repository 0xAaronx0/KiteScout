# Deployed on the Hostinger VPS (id 1601314) as Docker Compose project "watchtower".
#
# Polls the registry every 60s and auto-updates ONLY containers labelled
# com.centurylinklabs.watchtower.enable=true (currently just kitescout).
# Traefik, hermes-agent, and cruise-map are left untouched.
#
# Push-to-deploy chain:
#   git push (web/**) -> GitHub Actions builds & pushes ghcr.io/0xaaronx0/kitescout:latest
#   -> Watchtower sees the new digest within ~60s -> pulls + recreates kitescout
#   -> Traefik routes the new container automatically.
services:
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      # The image negotiates Docker API 1.25 by default, which the host daemon
      # rejects (min 1.40). Pin to a version the daemon supports.
      - DOCKER_API_VERSION=1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 60
