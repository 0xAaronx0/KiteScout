<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KiteScout Cruises logo">
  <defs>
    <linearGradient id="kc-sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect width="64" height="64" rx="15" fill="url(#kc-sky)"/>

  <!-- kite + string -->
  <g>
    <path d="M47 9 L52.5 14.5 L47 20 L41.5 14.5 Z" fill="#ffffff"/>
    <path d="M47 9 L47 20 M41.5 14.5 L52.5 14.5" stroke="#bae6fd" stroke-width="1.1"/>
    <path d="M47 20 C42 26 37 29 33 33" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.85"/>
    <path d="M47 20 q2.5 2.4 0 4.8 q-2.5 2.4 0 4.8" fill="none" stroke="#ffffff" stroke-width="1.1" opacity="0.7"/>
  </g>

  <!-- sailboat -->
  <g fill="#ffffff">
    <!-- main sail -->
    <path d="M31 16 L31 41 L16 41 Z"/>
    <!-- jib sail -->
    <path d="M33 22 L33 41 L43 41 Z" opacity="0.82"/>
    <!-- hull -->
    <path d="M13 43 H44 L39 50.5 H18 Z"/>
  </g>

  <!-- waves -->
  <g fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.85">
    <path d="M9 55 q3.75 -3.4 7.5 0 t7.5 0 t7.5 0 t7.5 0 t7.5 0"/>
  </g>
</svg>
