name: Build & publish Docker image

on:
  push:
    branches: [main]
    paths:
      - web/**
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Cancel an in-flight run if a newer push lands, so deploys can't race.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/0xaaronx0/kitescout
  HOSTINGER_VM_ID: "1601314"
  HOSTINGER_PROJECT: kitescout

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ env.IMAGE }}:latest
          # No layer cache: the gha cache repeatedly served a stale `npm run build`,
          # shipping images built from old source. Correctness over a ~3-min build.
          no-cache: true
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS and wait until healthy
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${HOSTINGER_API_TOKEN}" ]; then
            echo "::error::HOSTINGER_API_TOKEN secret is not set — add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          BASE="https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}"

          # 1. Trigger the recreate (the API is async — it returns an action id).
          echo "Triggering update of '${HOSTINGER_PROJECT}' on VM ${HOSTINGER_VM_ID}…"
          RESP=$(curl --fail-with-body -sS -X POST \
            "${BASE}/docker/${HOSTINGER_PROJECT}/update" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Content-Type: application/json") || { echo "::error::deploy request failed: $RESP"; exit 1; }
          echo "$RESP"
          ACTION_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          # 2. Wait for the async recreate action to actually finish (up to ~5 min).
          if [ -n "$ACTION_ID" ]; then
            echo "Waiting for recreate action ${ACTION_ID}…"
            for i in $(seq 1 30); do
              sleep 8
              STATE=$(curl -sS "${BASE}/actions/${ACTION_ID}" \
                -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('state',''))" 2>/dev/null || echo "")
              echo "  action state: ${STATE:-?}"
              case "$STATE" in
                success) break ;;
                error|failed) echo "::error::VPS recreate action ended in state '$STATE'"; exit 1 ;;
              esac
            done
          fi

          # 3. Verify the DEPLOYED COMMIT is actually live — not just a 200 from a
          #    stale image. Poll /api/version until it reports this exact SHA twice
          #    in a row (rides out the brief Traefik swap window). A stale deploy
          #    (image not updated — see deploy-gotchas #6) never matches, so it
          #    fails loudly here instead of passing a homepage health check.
          echo "Verifying /api/version reports ${GITHUB_SHA} …"
          ok=0
          for i in $(seq 1 40); do
            LIVE=$(curl -sS --max-time 10 https://kitescout.tech/api/version \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            echo "  attempt $i: live='${LIVE:0:12}' want='${GITHUB_SHA:0:12}'"
            if [ "$LIVE" = "${GITHUB_SHA}" ]; then ok=$((ok + 1)); else ok=0; fi
            if [ "$ok" -ge 2 ]; then echo "✅ deployed commit ${GITHUB_SHA:0:12} is live."; exit 0; fi
            sleep 6
          done
          echo "::error::/api/version never reported ${GITHUB_SHA} — the deploy is STALE (image not updated). See deploy-gotchas #6."
          exit 1
